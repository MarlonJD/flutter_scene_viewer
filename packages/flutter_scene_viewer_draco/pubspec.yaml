name: flutter_scene_viewer_draco
description: Optional native Draco decoder plugin for flutter_scene_viewer.
version: 0.1.0-alpha.0
publish_to: none

environment:
  sdk: ">=3.6.0 <4.0.0"
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  lints: ^5.0.0

flutter:
  assets:
    - third_party/draco/LICENSE
    - third_party/draco/FSV_LOCAL_MODIFICATIONS.md
    - third_party/draco/FSV_CODEC_CONTROL_PROVENANCE.sha256
  plugin:
    platforms:
      android:
        package: com.marlonjd.flutter_scene_viewer_draco
        pluginClass: FlutterSceneViewerDracoPlugin
      ios:
        pluginClass: FlutterSceneViewerDracoPlugin
